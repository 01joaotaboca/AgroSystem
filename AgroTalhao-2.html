<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgroTalhão">
<meta name="description" content="Medição GPS de talhões agrícolas">
<title>AgroTalhão Pro</title>
<link rel="manifest" id="manifest-placeholder">

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --verde-escuro: #0d2b0d;
    --verde-meio: #1a4d1a;
    --verde-vivo: #2d7a2d;
    --verde-claro: #4caf50;
    --verde-neon: #76ff03;
    --terra: #8b5e3c;
    --terra-clara: #c4956a;
    --ouro: #f0c040;
    --branco: #f5f5f0;
    --cinza: #b0b0a0;
    --fundo: #0a1f0a;
    --card: #111e11;
    --card2: #162416;
    --linha: rgba(76,175,80,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--fundo);
    color: var(--branco);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--verde-escuro), #0f2d12);
    border-bottom: 1px solid var(--linha);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(10px);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--verde-claro), var(--verde-neon));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--verde-neon); }
  .header-status {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--cinza);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555;
    transition: background .3s;
  }
  .status-dot.gps-on { background: var(--verde-neon); box-shadow: 0 0 6px var(--verde-neon); animation: pulse 1.5s infinite; }
  .status-dot.offline { background: var(--ouro); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--verde-escuro);
    border-bottom: 1px solid var(--linha);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: 70px;
    padding: 10px 8px;
    text-align: center;
    font-size: 11px; font-weight: 600;
    color: var(--cinza);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--verde-neon); border-color: var(--verde-neon); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ── PAGES ── */
  .page { display: none; padding: 16px; padding-bottom: 80px; }
  .page.active { display: block; }

  /* ── MAP PAGE ── */
  #map-page { padding: 0; }
  #map {
    width: 100%;
    height: calc(100dvh - 120px);
  }
  .map-controls {
    position: absolute;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    z-index: 500;
  }
  .map-btn {
    padding: 12px 18px;
    border: none; border-radius: 30px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
    transition: all .2s;
    white-space: nowrap;
  }
  .map-btn:active { transform: scale(.96); }
  .btn-iniciar { background: var(--verde-claro); color: #fff; }
  .btn-ponto   { background: var(--ouro); color: #000; }
  .btn-finalizar{ background: #e53935; color: #fff; }
  .btn-pos     { background: var(--card); color: var(--verde-neon); border: 1px solid var(--verde-neon); }

  .map-info-bar {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    background: rgba(10,31,10,.85);
    border: 1px solid var(--linha);
    border-radius: 12px;
    padding: 10px 14px;
    z-index: 500;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(8px);
  }
  .info-area {
    font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700;
    color: var(--verde-neon);
  }
  .info-pontos { font-size: 12px; color: var(--cinza); }

  /* ── FORM ── */
  .form-section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--verde-claro); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content:''; flex:1; height:1px;
    background: var(--linha);
  }
  .form-group { margin-bottom: 12px; }
  label { font-size: 11px; color: var(--cinza); display: block; margin-bottom: 5px; font-weight: 600; letter-spacing: .5px; }
  input, select, textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid rgba(76,175,80,.2);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--branco);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    transition: border .2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--verde-claro);
    box-shadow: 0 0 0 3px rgba(76,175,80,.1);
  }
  select option { background: #1a2e1a; }
  textarea { min-height: 80px; resize: vertical; }

  .area-display {
    background: linear-gradient(135deg, rgba(118,255,3,.08), rgba(45,122,45,.1));
    border: 1px solid rgba(118,255,3,.3);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 12px;
  }
  .area-display .num {
    font-family: 'Space Mono', monospace;
    font-size: 32px; font-weight: 700;
    color: var(--verde-neon);
  }
  .area-display .unit { font-size: 12px; color: var(--cinza); margin-top: 2px; }

  .btn-salvar {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--verde-claro), var(--verde-vivo));
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: .5px;
    transition: all .2s;
    box-shadow: 0 4px 20px rgba(76,175,80,.3);
  }
  .btn-salvar:active { transform: scale(.98); }
  .btn-salvar:disabled { opacity: .5; cursor: not-allowed; }

  /* ── LISTA ── */
  .talhao-card {
    background: var(--card);
    border: 1px solid var(--linha);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .talhao-card::before {
    content:'';
    position: absolute; left:0; top:0; bottom:0;
    width: 3px;
    background: linear-gradient(to bottom, var(--verde-claro), var(--verde-neon));
  }
  .talhao-card:active { transform: scale(.99); background: var(--card2); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-nome { font-size: 16px; font-weight: 700; }
  .card-area {
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--verde-neon);
    background: rgba(118,255,3,.08);
    padding: 3px 8px; border-radius: 6px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag {
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    font-weight: 600;
  }
  .tag-cultura { background: rgba(76,175,80,.15); color: var(--verde-claro); border: 1px solid rgba(76,175,80,.2); }
  .tag-variedade { background: rgba(240,192,64,.1); color: var(--ouro); border: 1px solid rgba(240,192,64,.2); }
  .card-datas { font-size: 11px; color: var(--cinza); display: flex; gap: 12px; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-sm {
    flex: 1; padding: 8px;
    border-radius: 8px; border: none;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .btn-ver  { background: rgba(76,175,80,.15); color: var(--verde-claro); }
  .btn-del  { background: rgba(229,57,53,.1); color: #ef5350; }
  .btn-sm:active { transform: scale(.96); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--cinza);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--linha);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 24px; font-weight: 700;
    color: var(--verde-neon);
  }
  .stat-label { font-size: 11px; color: var(--cinza); margin-top: 4px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.8);
    z-index: 2000;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    width: 100%; max-height: 90dvh;
    overflow-y: auto;
    padding: 20px 16px;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,.2);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--linha); }
  .detail-label { font-size: 12px; color: var(--cinza); }
  .detail-val { font-size: 13px; font-weight: 600; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--verde-vivo);
    color: #fff; padding: 12px 20px;
    border-radius: 30px; font-size: 13px; font-weight: 600;
    z-index: 3000; transition: transform .3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #c62828; }

  /* ── INSTALL BANNER ── */
  .install-banner {
    background: linear-gradient(135deg, rgba(118,255,3,.1), rgba(45,122,45,.15));
    border: 1px solid rgba(118,255,3,.3);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .install-banner.hidden { display: none; }
  .btn-install {
    margin-left: auto;
    padding: 8px 16px;
    background: var(--verde-neon);
    color: #000;
    border: none; border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--verde-escuro), rgba(13,43,13,.95));
    border-top: 1px solid var(--linha);
    display: flex;
    padding: 8px 0 env(safe-area-inset-bottom, 8px);
    z-index: 900;
    backdrop-filter: blur(10px);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer;
    padding: 6px 4px;
    transition: all .2s;
    color: var(--cinza);
    font-size: 10px; font-weight: 600;
  }
  .nav-item .nav-icon { font-size: 20px; transition: transform .2s; }
  .nav-item.active { color: var(--verde-neon); }
  .nav-item.active .nav-icon { transform: scale(1.1); }

  /* coordenadas */
  .coord-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--cinza);
    background: var(--card);
    border: 1px solid var(--linha);
    border-radius: 6px;
    padding: 4px 8px;
    margin-bottom: 8px;
    display: inline-block;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .points-list { margin: 8px 0; }
  .point-item {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--cinza);
    padding: 4px 8px;
    background: var(--card2);
    border-radius: 6px; margin-bottom: 4px;
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🌿</div>
    <div class="logo-text">Agro<span>Talhão</span></div>
  </div>
  <div class="header-status">
    <div class="status-dot" id="gps-dot"></div>
    <span id="gps-label">GPS</span>
    &nbsp;
    <div class="status-dot" id="net-dot" style="background:var(--verde-neon)"></div>
    <span id="net-label">Online</span>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <div class="tab active" onclick="goTab('mapa','tab-mapa')" id="tab-mapa">
    <span class="tab-icon">🗺️</span>Mapa
  </div>
  <div class="tab" onclick="goTab('cadastro','tab-cadastro')" id="tab-cadastro">
    <span class="tab-icon">📋</span>Cadastro
  </div>
  <div class="tab" onclick="goTab('lista','tab-lista')" id="tab-lista">
    <span class="tab-icon">📁</span>Talhões
  </div>
  <div class="tab" onclick="goTab('stats','tab-stats')" id="tab-stats">
    <span class="tab-icon">📊</span>Resumo
  </div>
</nav>

<!-- PAGE: MAPA -->
<div id="mapa" class="page active" style="position:relative; padding:0;">
  <div id="map"></div>
  <div class="map-info-bar">
    <div>
      <div class="info-area" id="area-display">0,00 ha</div>
      <div class="info-pontos" id="pontos-display">0 pontos marcados</div>
    </div>
    <div style="text-align:right">
      <div class="coord-badge" id="coord-display">—</div>
    </div>
  </div>
  <div class="map-controls">
    <button class="map-btn btn-pos" onclick="centralizarPosicao()">📍 Posição</button>
    <button class="map-btn btn-ponto" onclick="adicionarPonto()" id="btn-ponto" style="display:none">+ Ponto</button>
    <button class="map-btn btn-iniciar" onclick="iniciarMedicao()" id="btn-iniciar">▶ Iniciar</button>
    <button class="map-btn btn-finalizar" onclick="finalizarMedicao()" id="btn-finalizar" style="display:none">✓ Finalizar</button>
  </div>
</div>

<!-- PAGE: CADASTRO -->
<div id="cadastro" class="page">
  <div class="install-banner hidden" id="install-banner">
    <span>📲</span>
    <div style="font-size:12px;">Instale o app para uso offline!</div>
    <button class="btn-install" id="btn-install">Instalar</button>
  </div>

  <div class="form-section">
    <div class="section-title">📐 Área Medida</div>
    <div class="area-display">
      <div class="num" id="area-form-display">0,00</div>
      <div class="unit">hectares</div>
    </div>
    <div id="area-form-m2" style="text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--cinza);margin-top:-8px;margin-bottom:12px">0 m²</div>
  </div>

  <div class="form-section">
    <div class="section-title">🌾 Identificação</div>
    <div class="form-group">
      <label>NOME DO TALHÃO *</label>
      <input type="text" id="f-nome" placeholder="Ex: Talhão 01 – Gleba Norte">
    </div>
    <div class="row2">
      <div class="form-group">
        <label>FAZENDA</label>
        <input type="text" id="f-fazenda" placeholder="Nome da fazenda">
      </div>
      <div class="form-group">
        <label>SAFRA</label>
        <input type="text" id="f-safra" placeholder="2024/25">
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">🌱 Cultura</div>
    <div class="form-group">
      <label>CULTURA *</label>
      <select id="f-cultura" onchange="atualizarVariedades()">
        <option value="">Selecione a cultura...</option>
        <option value="Soja">🫘 Soja</option>
        <option value="Milho">🌽 Milho</option>
        <option value="Algodão">🌿 Algodão</option>
        <option value="Feijão">🫘 Feijão</option>
        <option value="Sorgo">🌾 Sorgo</option>
        <option value="Arroz">🌾 Arroz</option>
        <option value="Cana-de-Açúcar">🎋 Cana-de-Açúcar</option>
        <option value="Pastagem">🌿 Pastagem</option>
        <option value="Eucalipto">🌲 Eucalipto</option>
        <option value="Outra">➕ Outra</option>
      </select>
    </div>
    <div class="form-group">
      <label>VARIEDADE / CULTIVAR</label>
      <input type="text" id="f-variedade" placeholder="Ex: M8372, DM70i65, P98Y30...">
      <div id="variedades-sugestoes" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;"></div>
    </div>
    <div class="form-group">
      <label>OBSERVAÇÕES</label>
      <textarea id="f-obs" placeholder="Informações adicionais sobre o talhão..."></textarea>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">📅 Datas do Plantio</div>
    <div class="row2">
      <div class="form-group">
        <label>DATA INÍCIO *</label>
        <input type="date" id="f-data-inicio">
      </div>
      <div class="form-group">
        <label>DATA FINAL</label>
        <input type="date" id="f-data-fim">
      </div>
    </div>
    <div class="form-group">
      <label>ESTIMATIVA COLHEITA</label>
      <input type="date" id="f-data-colheita">
    </div>
  </div>

  <button class="btn-salvar" onclick="salvarTalhao()" id="btn-salvar-form">💾 Salvar Talhão</button>
</div>

<!-- PAGE: LISTA -->
<div id="lista" class="page">
  <div id="lista-container"></div>
</div>

<!-- PAGE: STATS -->
<div id="stats" class="page">
  <div class="stats-grid" id="stats-grid"></div>
  <div id="stats-culturas"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-mapa" onclick="goTab('mapa','tab-mapa');setNav('nav-mapa')">
    <span class="nav-icon">🗺️</span>Mapa
  </div>
  <div class="nav-item" id="nav-cadastro" onclick="goTab('cadastro','tab-cadastro');setNav('nav-cadastro')">
    <span class="nav-icon">📋</span>Cadastro
  </div>
  <div class="nav-item" id="nav-lista" onclick="goTab('lista','tab-lista');setNav('nav-lista')">
    <span class="nav-icon">📁</span>Talhões
  </div>
  <div class="nav-item" id="nav-stats" onclick="goTab('stats','tab-stats');setNav('nav-stats')">
    <span class="nav-icon">📊</span>Resumo
  </div>
</nav>

<!-- MODAL DETALHES -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let map, tileLayer, positionMarker, trackingCircle;
let polygon = null, polygonPoints = [], polyline = null;
let medicaoAtiva = false;
let watchId = null;
let currentLat = null, currentLng = null;
let editandoId = null;

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.remove('hidden');
});
document.getElementById('btn-install')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
  deferredPrompt = null;
});

// ── offline/online ──

let layerOSM, layerSat, layerGoogle;

function initMap() {
  // Inicia em zoom baixo no centro do Brasil — GPS vai mover depois
  map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22 })
         .setView([-5.0, -45.5], 5);

  // Camada base: Google Satellite (melhor cobertura rural BR)
  layerGoogle = L.tileLayer(
    'https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
    { subdomains: ['0','1','2','3'], maxZoom: 22, maxNativeZoom: 21, opacity: 0 }
  ).addTo(map);

  // Camada base: ESRI World Imagery
  layerSat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 22, maxNativeZoom: 20, opacity: 0 }
  ).addTo(map);

  // Camada base: OSM (ruas)
  layerOSM = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 22, maxNativeZoom: 19, opacity: 1 }
  ).addTo(map);

  // Inicia já no satélite Google por padrão
  satMode = 'google';
  layerOSM.setOpacity(0);
  layerGoogle.setOpacity(1);
  document.getElementById('sat-label') && (document.getElementById('sat-label').textContent = '🛰 GOOGLE');

  // Botão ciclo de mapa: Google Sat → ESRI Sat → OSM Ruas
  const satBtn = L.control({ position: 'topright' });
  satBtn.onAdd = () => {
    const d = L.DomUtil.create('div');
    d.style.cssText = 'margin:10px 10px 0 0;';
    d.innerHTML = '<button id="sat-btn" onclick="cicloMapa()" style="background:#1a3a1a;border:1px solid rgba(76,175,80,.4);color:#76ff03;padding:8px 14px;border-radius:10px;font-family:Syne,sans-serif;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)"><span id="sat-label">🛰 GOOGLE</span></button>';
    L.DomEvent.disableClickPropagation(d);
    return d;
  };
  satBtn.addTo(map);

  // Botões zoom grandes
  const zoomCtrl = L.control({ position: 'bottomright' });
  zoomCtrl.onAdd = () => {
    const d = L.DomUtil.create('div');
    d.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin:0 10px 90px 0;';
    const s = 'width:50px;height:50px;background:#1a3a1a;border:2px solid rgba(76,175,80,.5);border-radius:12px;color:#76ff03;font-size:26px;font-weight:900;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;';
    d.innerHTML = `<button onclick="map.zoomIn()" style="${s}">+</button><button onclick="map.zoomOut()" style="${s}">−</button>`;
    L.DomEvent.disableClickPropagation(d);
    return d;
  };
  zoomCtrl.addTo(map);

  map.on('click', mapClick);
  // NÃO centraliza aqui — espera o GPS chegar
}

let satMode = 'google';
function cicloMapa() {
  const modos = ['google','esri','osm'];
  const labels = { google:'🛰 GOOGLE', esri:'🛰 ESRI', osm:'🗺 RUAS' };
  const idx = modos.indexOf(satMode);
  satMode = modos[(idx + 1) % 3];

  layerGoogle.setOpacity(satMode === 'google' ? 1 : 0);
  layerSat.setOpacity(satMode === 'esri' ? 1 : 0);
  layerOSM.setOpacity(satMode === 'osm' ? 1 : 0);

  const lbl = document.getElementById('sat-label');
  if (lbl) lbl.textContent = labels[satMode];
}
// manter toggleSat apontando para cicloMapa por compatibilidade
function toggleSat() { cicloMapa(); }

function mapClick(e) {
  if (medicaoAtiva) {
    adicionarPontoCoord(e.latlng.lat, e.latlng.lng);
  }
}

// ══════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════
let primeiraPosicao = true;

function iniciarGPS() {
  if (!navigator.geolocation) { showToast('GPS não disponível', true); return; }
  watchId = navigator.geolocation.watchPosition(
    pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      document.getElementById('gps-dot').className = 'status-dot gps-on';
      document.getElementById('gps-label').textContent = `±${Math.round(acc)}m`;
      document.getElementById('coord-display').textContent =
        `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;

      const latlng = [currentLat, currentLng];

      // Na primeira posição recebida, centraliza o mapa automaticamente
      if (primeiraPosicao) {
        primeiraPosicao = false;
        map.setView(latlng, 18);
      }

      if (!positionMarker) {
        positionMarker = L.circleMarker(latlng, {
          radius: 10, fillColor: '#76ff03', color: '#fff', weight: 3, fillOpacity: 1
        }).addTo(map);
        trackingCircle = L.circle(latlng, { radius: acc, color: '#76ff03', fillOpacity: .06, weight: 1 }).addTo(map);
      } else {
        positionMarker.setLatLng(latlng);
        trackingCircle.setLatLng(latlng).setRadius(acc);
      }
    },
    err => {
      document.getElementById('gps-dot').className = 'status-dot';
      document.getElementById('gps-label').textContent = 'GPS';
      let msg = 'Erro GPS';
      if (err.code === 1) msg = 'Permissão GPS negada';
      if (err.code === 2) msg = 'GPS indisponível';
      if (err.code === 3) msg = 'GPS timeout';
      showToast(msg, true);
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );
}

function centralizarPosicao() {
  if (currentLat) {
    map.setView([currentLat, currentLng], 18);
  } else {
    showToast('Aguardando GPS... Verifique permissão');
    navigator.geolocation?.getCurrentPosition(p => {
      map.setView([p.coords.latitude, p.coords.longitude], 18);
    }, err => {
      showToast('Ative o GPS e recarregue', true);
    }, { enableHighAccuracy: true, timeout: 12000 });
  }
}

// ══════════════════════════════════════════
function iniciarMedicao() {
  medicaoAtiva = true;
  polygonPoints = [];
  limparPoligono();
  document.getElementById('btn-iniciar').style.display = 'none';
  document.getElementById('btn-ponto').style.display = 'flex';
  document.getElementById('btn-finalizar').style.display = 'flex';
  document.getElementById('area-display').textContent = '0,00 ha';
  document.getElementById('pontos-display').textContent = 'Clique no mapa ou use GPS';
  showToast('Clique no mapa ou toque em + Ponto para GPS');
}

function adicionarPonto() {
  if (!currentLat) { showToast('Aguardando GPS...', true); return; }
  adicionarPontoCoord(currentLat, currentLng);
}

function adicionarPontoCoord(lat, lng) {
  polygonPoints.push([lat, lng]);
  desenharPoligono();
  document.getElementById('pontos-display').textContent = `${polygonPoints.length} pontos marcados`;
  if (polygonPoints.length >= 3) {
    const area = calcularArea(polygonPoints);
    document.getElementById('area-display').textContent = `${area.toFixed(4)} ha`;
    atualizarAreaForm(area);
  }
}

function desenharPoligono() {
  if (polyline) { map.removeLayer(polyline); polyline = null; }
  if (polygon)  { map.removeLayer(polygon);  polygon = null; }

  // Markers dos pontos
  map.eachLayer(l => { if (l._agroPoint) map.removeLayer(l); });

  polygonPoints.forEach((p, i) => {
    const m = L.circleMarker(p, {
      radius: 6, fillColor: '#f0c040', color: '#fff', weight: 2, fillOpacity: 1
    }).addTo(map);
    m._agroPoint = true;
  });

  if (polygonPoints.length >= 2) {
    const pts = [...polygonPoints, polygonPoints[0]];
    polyline = L.polyline(pts, { color: '#76ff03', weight: 2, dashArray: '6 4', opacity: .8 }).addTo(map);
  }
  if (polygonPoints.length >= 3) {
    polygon = L.polygon(polygonPoints, {
      color: '#76ff03', weight: 2, fillColor: '#76ff03', fillOpacity: .12
    }).addTo(map);
    map.fitBounds(polygon.getBounds(), { padding: [40, 40] });
  }
}

function finalizarMedicao() {
  if (polygonPoints.length < 3) { showToast('Adicione pelo menos 3 pontos!', true); return; }
  medicaoAtiva = false;
  document.getElementById('btn-iniciar').style.display = 'flex';
  document.getElementById('btn-ponto').style.display = 'none';
  document.getElementById('btn-finalizar').style.display = 'none';
  const area = calcularArea(polygonPoints);
  atualizarAreaForm(area);
  showToast(`Área medida: ${area.toFixed(4)} ha — preencha o cadastro!`);
  goTab('cadastro', 'tab-cadastro');
  setNav('nav-cadastro');
}

function limparPoligono() {
  if (polyline) { map.removeLayer(polyline); polyline = null; }
  if (polygon)  { map.removeLayer(polygon);  polygon = null; }
  map.eachLayer(l => { if (l._agroPoint) map.removeLayer(l); });
}

function atualizarAreaForm(area) {
  document.getElementById('area-form-display').textContent = area.toFixed(4);
  document.getElementById('area-form-m2').textContent = `${Math.round(area * 10000).toLocaleString('pt-BR')} m²`;
}

// Shoelace formula → hectares
function calcularArea(pts) {
  if (pts.length < 3) return 0;
  const R = 6371000;
  let area = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    const xi = pts[i][1] * Math.PI / 180 * R * Math.cos(pts[i][0] * Math.PI / 180);
    const yi = pts[i][0] * Math.PI / 180 * R;
    const xj = pts[j][1] * Math.PI / 180 * R * Math.cos(pts[j][0] * Math.PI / 180);
    const yj = pts[j][0] * Math.PI / 180 * R;
    area += xi * yj - xj * yi;
  }
  return Math.abs(area / 2) / 10000;
}

//  SALVAR / CARREGAR
// ══════════════════════════════════════════
function getTalhoes() {
  return JSON.parse(localStorage.getItem('agrotalhao_v3') || '[]');
}
function saveTalhoes(t) {
  localStorage.setItem('agrotalhao_v3', JSON.stringify(t));
}

function salvarTalhao() {
  const nome = document.getElementById('f-nome').value.trim();
  const cultura = document.getElementById('f-cultura').value;
  const dataInicio = document.getElementById('f-data-inicio').value;
  const areaVal = parseFloat(document.getElementById('area-form-display').textContent.replace(',','.')) || 0;

  if (!nome)      { showToast('Informe o nome do talhão!', true); return; }
  if (!cultura)   { showToast('Selecione a cultura!', true); return; }
  if (!dataInicio){ showToast('Informe a data de início!', true); return; }
  if (areaVal <= 0){ showToast('Meça a área no mapa primeiro!', true); return; }

  const talhoes = getTalhoes();
  const obj = {
    id: editandoId || Date.now().toString(),
    nome,
    fazenda: document.getElementById('f-fazenda').value.trim(),
    safra: document.getElementById('f-safra').value.trim(),
    cultura,
    variedade: document.getElementById('f-variedade').value.trim(),
    obs: document.getElementById('f-obs').value.trim(),
    dataInicio,
    dataFim: document.getElementById('f-data-fim').value,
    dataColheita: document.getElementById('f-data-colheita').value,
    area: areaVal,
    areaM2: Math.round(areaVal * 10000),
    pontos: [...polygonPoints],
    criadoEm: editandoId ? (talhoes.find(t => t.id === editandoId)?.criadoEm || new Date().toISOString()) : new Date().toISOString(),
    atualizadoEm: new Date().toISOString(),
  };

  if (editandoId) {
    const idx = talhoes.findIndex(t => t.id === editandoId);
    if (idx >= 0) talhoes[idx] = obj;
    editandoId = null;
  } else {
    talhoes.unshift(obj);
  }
  saveTalhoes(talhoes);
  limparFormulario();
  limparPoligono();
  polygonPoints = [];
  renderLista();
  renderStats();
  showToast('✅ Talhão salvo com sucesso!');
  goTab('lista', 'tab-lista');
  setNav('nav-lista');
}

function limparFormulario() {
  ['f-nome','f-fazenda','f-safra','f-variedade','f-obs','f-data-inicio','f-data-fim','f-data-colheita'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-cultura').value = '';
  document.getElementById('area-form-display').textContent = '0,00';
  document.getElementById('area-form-m2').textContent = '0 m²';
  document.getElementById('variedades-sugestoes').innerHTML = '';
  document.getElementById('area-display').textContent = '0,00 ha';
  document.getElementById('pontos-display').textContent = '0 pontos marcados';
  editandoId = null;
}

// ══════════════════════════════════════════
//  LISTA
// ══════════════════════════════════════════
function renderLista() {
  const talhoes = getTalhoes();
  const cont = document.getElementById('lista-container');
  if (!talhoes.length) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">🌾</div><div class="empty-text">Nenhum talhão cadastrado ainda.<br>Use o mapa para medir e o cadastro para registrar.</div></div>`;
    return;
  }
  cont.innerHTML = talhoes.map(t => `
    <div class="talhao-card" onclick="verDetalhes('${t.id}')">
      <div class="card-header">
        <div class="card-nome">${t.nome}</div>
        <div class="card-area">${Number(t.area).toFixed(2)} ha</div>
      </div>
      <div class="card-tags">
        <span class="tag tag-cultura">${t.cultura}</span>
        ${t.variedade ? `<span class="tag tag-variedade">${t.variedade}</span>` : ''}
        ${t.fazenda ? `<span class="tag" style="background:rgba(139,94,60,.15);color:var(--terra-clara);border:1px solid rgba(139,94,60,.2)">${t.fazenda}</span>` : ''}
      </div>
      <div class="card-datas">
        ${t.dataInicio ? `📅 Plantio: ${fmtDate(t.dataInicio)}` : ''}
        ${t.dataFim ? ` → ${fmtDate(t.dataFim)}` : ''}
        ${t.dataColheita ? ` 🌾 Colheita: ${fmtDate(t.dataColheita)}` : ''}
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-sm btn-ver" onclick="verNoMapa('${t.id}')">🗺 Ver no Mapa</button>
        <button class="btn-sm btn-ver" onclick="editarTalhao('${t.id}')">✏️ Editar</button>
        <button class="btn-sm btn-del" onclick="confirmarDelete('${t.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function confirmarDelete(id) {
  if (!confirm('Excluir este talhão?')) return;
  const t = getTalhoes().filter(x => x.id !== id);
  saveTalhoes(t);
  renderLista();
  renderStats();
  showToast('Talhão removido');
}

function verNoMapa(id) {
  const t = getTalhoes().find(x => x.id === id);
  if (!t || !t.pontos?.length) { showToast('Sem coordenadas salvas', true); return; }
  polygonPoints = t.pontos;
  desenharPoligono();
  goTab('mapa', 'tab-mapa');
  setNav('nav-mapa');
}

function editarTalhao(id) {
  const t = getTalhoes().find(x => x.id === id);
  if (!t) return;
  editandoId = id;
  document.getElementById('f-nome').value = t.nome || '';
  document.getElementById('f-fazenda').value = t.fazenda || '';
  document.getElementById('f-safra').value = t.safra || '';
  document.getElementById('f-cultura').value = t.cultura || '';
  document.getElementById('f-variedade').value = t.variedade || '';
  document.getElementById('f-obs').value = t.obs || '';
  document.getElementById('f-data-inicio').value = t.dataInicio || '';
  document.getElementById('f-data-fim').value = t.dataFim || '';
  document.getElementById('f-data-colheita').value = t.dataColheita || '';
  document.getElementById('area-form-display').textContent = Number(t.area).toFixed(4);
  document.getElementById('area-form-m2').textContent = `${(t.areaM2||0).toLocaleString('pt-BR')} m²`;
  if (t.pontos?.length) polygonPoints = t.pontos;
  atualizarVariedades();
  goTab('cadastro', 'tab-cadastro');
  setNav('nav-cadastro');
}

// ══════════════════════════════════════════
//  MODAL DETALHES
// ══════════════════════════════════════════
function verDetalhes(id) {
  const t = getTalhoes().find(x => x.id === id);
  if (!t) return;
  const rows = [
    ['Talhão', t.nome],
    ['Fazenda', t.fazenda || '—'],
    ['Safra', t.safra || '—'],
    ['Cultura', t.cultura],
    ['Variedade', t.variedade || '—'],
    ['Área', `${Number(t.area).toFixed(4)} ha (${(t.areaM2||0).toLocaleString('pt-BR')} m²)`],
    ['Início Plantio', t.dataInicio ? fmtDate(t.dataInicio) : '—'],
    ['Fim Plantio', t.dataFim ? fmtDate(t.dataFim) : '—'],
    ['Previsão Colheita', t.dataColheita ? fmtDate(t.dataColheita) : '—'],
    ['Pontos GPS', `${t.pontos?.length || 0} vértices`],
    ['Observações', t.obs || '—'],
    ['Cadastrado em', t.criadoEm ? new Date(t.criadoEm).toLocaleString('pt-BR') : '—'],
  ];
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">${t.nome}</div>
    ${rows.map(([l,v]) => `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-val">${v}</span></div>`).join('')}
    <br>
    <button class="btn-salvar" onclick="verNoMapa('${t.id}');fecharModal()" style="margin-top:8px">🗺 Ver no Mapa</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function fecharModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ══════════════════════════════════════════
//  STATS
// ══════════════════════════════════════════
function renderStats() {
  const t = getTalhoes();
  const totalArea = t.reduce((s, x) => s + Number(x.area), 0);
  const culturas = {};
  t.forEach(x => { culturas[x.cultura] = (culturas[x.cultura] || 0) + Number(x.area); });

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${t.length}</div><div class="stat-label">Talhões</div></div>
    <div class="stat-card"><div class="stat-num">${totalArea.toFixed(1)}</div><div class="stat-label">Total ha</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(culturas).length}</div><div class="stat-label">Culturas</div></div>
    <div class="stat-card"><div class="stat-num">${t.length ? (totalArea/t.length).toFixed(1) : '0'}</div><div class="stat-label">Média ha/talhão</div></div>
  `;

  const culList = Object.entries(culturas).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stats-culturas').innerHTML = culList.length ? `
    <div class="section-title" style="margin-bottom:12px">🌱 Por Cultura</div>
    ${culList.map(([c,a]) => `
      <div style="background:var(--card);border:1px solid var(--linha);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">${c}</span>
        <span style="font-family:'Space Mono',monospace;color:var(--verde-neon)">${a.toFixed(2)} ha</span>
      </div>
    `).join('')}
  ` : '';
}

// ══════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════
function goTab(page, tabId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  document.getElementById(tabId).classList.add('active');
  if (page === 'lista') renderLista();
  if (page === 'stats') renderStats();
}
function setNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

//  TOAST

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

function injectManifest() {
  const manifest = {
    name: 'AgroTalhão Pro',
    short_name: 'AgroTalhão',
    start_url: './',
    display: 'standalone',
    background_color: '#0a1f0a',
    theme_color: '#1a3a1a',
    orientation: 'portrait-primary',
    icons: [
      { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="32" fill="%231a3a1a"/><text y="130" x="96" font-size="110" text-anchor="middle">🌿</text></svg>', sizes: '192x192', type: 'image/svg+xml' },
      { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="64" fill="%231a3a1a"/><text y="360" x="256" font-size="300" text-anchor="middle">🌿</text></svg>', sizes: '512x512', type: 'image/svg+xml' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('manifest-placeholder').href = URL.createObjectURL(blob);
}

function registerSW() {
  const swCode = `
    const CACHE = 'agrotalhao-v3';
    const ASSETS = [
      'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css',
      'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',
      'https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap',
    ];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{})));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(res => {
            if (res.ok) {
              const clone = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
            }
            return res;
          }).catch(() => cached || new Response('Offline', {status:503}));
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker?.register(url).catch(() => {});
}

window.addEventListener('DOMContentLoaded', () => {
  injectManifest();
  registerSW();
  initMap();
  iniciarGPS();
  renderLista();
  renderStats();

  document.getElementById('f-data-inicio').value = new Date().toISOString().split('T')[0];
});
